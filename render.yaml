services:
  # ── Backend API ──────────────────────────────────────────────────
  - type: web
    name: hometrue-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ATTOM_API_KEY
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://hometrue.onrender.com
    plan: free

  # ── Frontend (React) ─────────────────────────────────────────────
  - type: web
    name: hometrue
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        value: https://hometrue-api.onrender.com
    plan: free
